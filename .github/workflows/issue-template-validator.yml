name: Issue Template Validator

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

concurrency:
  group: issue-template-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.issue.pull_request == null && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Validate issue template and labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = issue.user.login;
            const body = issue.body || '';

            const labelDefinitions = {
              gssoc26: '0E8A16',
              nsoc26: '1D76DB',
              SSoC26: '5319E7',
              ELUSOC: 'FBCA04',
              bug: 'D73A4A',
              enhancement: 'A2EEEF',
              duplicate: 'CFD3D7',
              'not needed': 'D93F0B',
              'out of scope': 'D93F0B',
              'go ahead': '0E8A16',
              'needs maintainer review': 'FBCA04',
              'ready to work': '0E8A16',
              'stale-assignment': 'D93F0B',
              'priority: low': 'C2E0C6',
              'priority: medium': 'FBCA04',
              'priority: high': 'D93F0B',
              'level: easy': 'C2E0C6',
              'level: medium': 'FBCA04',
              'level: hard': 'D93F0B',
              'needs-template': 'B60205',
              'needs-quality': 'D4C5F9'
            };

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color: labelDefinitions[name] || 'EDEDED'
                  });
                } else {
                  throw error;
                }
              }
            }

            async function addLabels(labels) {
              for (const label of labels) await ensureLabel(label);
              if (labels.length > 0) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels });
              }
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            for (const label of ['duplicate', 'not needed', 'out of scope', 'go ahead', 'needs maintainer review', 'ready to work', 'stale-assignment', 'priority: low', 'priority: medium', 'priority: high', 'level: easy', 'level: medium', 'level: hard']) {
              await ensureLabel(label);
            }

            const programs = [
              { name: 'GSSoC', label: 'gssoc26', pattern: /\bGSSoC\b/i },
              { name: 'NSOC', label: 'nsoc26', pattern: /\bNSOC\b/i },
              { name: 'SSOC', label: 'SSoC26', pattern: /\bSSOC\b/i },
              { name: 'ELUSOC', label: 'ELUSOC', pattern: /\bELUSOC\b/i }
            ];

            const matchedProgram = programs.find(program => program.pattern.test(body));
            const isBugTemplate =
              /##.*Describe the bug/i.test(body) &&
              /##.*Steps to Reproduce/i.test(body) &&
              /##.*Expected Behavior/i.test(body) &&
              /##.*Actual Behavior/i.test(body);
            const isFeatureTemplate =
              /##.*Feature Description/i.test(body) &&
              /##.*Problem It Solves/i.test(body) &&
              /##.*Proposed Solution/i.test(body) &&
              /##.*Acceptance Criteria/i.test(body);

            const templateProblems = [];
            const qualityProblems = [];
            const labelsToAdd = [];

            if (!matchedProgram) {
              templateProblems.push('Please select one program template: GSSoC, NSOC, SSOC, or ELUSOC.');
            }

            if (!isBugTemplate && !isFeatureTemplate) {
              templateProblems.push('Please use the mandatory bug report or feature request issue template.');
            }

            if (templateProblems.length === 0) {
              labelsToAdd.push(matchedProgram.label);
              labelsToAdd.push('needs maintainer review');
              if (isBugTemplate) labelsToAdd.push('bug');
              if (isFeatureTemplate) labelsToAdd.push('enhancement');
            }

            if ((body || '').replace(/<!--[\s\S]*?-->/g, '').trim().length < 80) {
              qualityProblems.push('Please add enough detail so maintainers can review this issue.');
              labelsToAdd.push('needs-quality');
            }

            if (templateProblems.length > 0) {
              labelsToAdd.push('needs-template');
              for (const program of programs) await removeLabel(program.label);
              await removeLabel('bug');
              await removeLabel('enhancement');
              await removeLabel('needs maintainer review');
              await removeLabel('ready to work');
            }

            await addLabels([...new Set(labelsToAdd)]);

            if (templateProblems.length === 0) {
              await removeLabel('needs-template');
            }

            if (qualityProblems.length === 0) {
              await removeLabel('needs-quality');
            }

            const problems = [...templateProblems, ...qualityProblems];

            const marker = '<!-- voiceforge-issue-template-validator -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body &&
              comment.body.includes(marker)
            );

            if (problems.length === 0) {
              const successBody =
                `${marker}\n` +
                `## Issue Intake Passed\n\n` +
                `Hi @${username}, thank you for opening this issue with the correct template.\n\n` +
                `Your issue has entered the maintainer review queue. The team will check scope, priority, labels, and readiness before assigning it to a contributor.\n\n` +
                `| Check | Status |\n` +
                `| --- | --- |\n` +
                `| Program template | ${matchedProgram.name} detected |\n` +
                `| Issue type | ${isBugTemplate ? 'Bug report' : 'Feature request'} |\n` +
                `| Detail level | Ready for maintainer review |\n` +
                `| Next step | Maintainer assignment |\n\n` +
                `Please wait for maintainer confirmation before starting work. Assignment requests are welcome, but work should begin only after assignment.\n\n` +
                `VoiceForge automation`;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: successBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: successBody
                });
              }
              return;
            }

            const commentBody =
              `${marker}\n` +
              `## Template Update Needed\n\n` +
              `Hi @${username}, thank you for opening this issue.\n\n` +
              `VoiceForge automation found a few items that need correction before maintainers can review and assign this issue.\n\n` +
              `### What Needs Attention\n\n` +
              problems.map(problem => `- ${problem}`).join('\n') +
              `\n\n` +
              `### How To Fix\n\n` +
              `| Area | Correction |\n` +
              `| --- | --- |\n` +
              `${templateProblems.length > 0 ? '| Template | Use one complete program issue template: GSSoC, NSOC, SSOC, or ELUSOC. |\n' : ''}` +
              `${qualityProblems.length > 0 ? '| Details | Add clear context, expected behavior, screenshots/logs if useful, and enough steps for maintainers to understand the request. |\n' : ''}` +
              `\nAfter editing the issue, this comment will update automatically.\n\n` +
              `VoiceForge automation`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody
              });
            }

name: Issue Triage Suggestion

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  models: read

concurrency:
  group: issue-triage-suggestion-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: |
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]' &&
      (
        (
          github.event_name == 'issues' &&
          (
            github.event.action == 'opened' ||
            github.event.label.name == 'needs maintainer review'
          )
        ) ||
        (
          github.event_name == 'issue_comment' &&
          startsWith(github.event.comment.body, '/chal')
        )
      ) &&
      !contains(github.event.issue.labels.*.name, 'go ahead') &&
      !contains(github.event.issue.labels.*.name, 'duplicate') &&
      !contains(github.event.issue.labels.*.name, 'not needed') &&
      !contains(github.event.issue.labels.*.name, 'out of scope') &&
      !contains(github.event.issue.labels.*.name, 'closed') &&
      !contains(github.event.issue.labels.*.name, 'ready to work')
    runs-on: ubuntu-latest

    steps:
      - name: Suggest issue triage decision
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: ${{ vars.GITHUB_MODEL || 'openai/gpt-4.1-mini' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const githubModel = process.env.GITHUB_MODEL || 'openai/gpt-4.1-mini';

            if (context.eventName === 'issue_comment') {
              const command = (context.payload.comment.body || '').trim();
              if (command !== '/chal') return;

              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: context.actor
                });
                if (!['admin', 'maintain', 'write'].includes(data.permission)) {
                  core.warning(`Ignoring /chal because @${context.actor} does not have write, maintain, or admin permission.`);
                  return;
                }
              } catch (error) {
                core.warning(`Could not verify /chal permission for @${context.actor}: ${error.message}`);
                return;
              }
            }

            async function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function getFreshIssue() {
              const { data } = await github.rest.issues.get({
                owner,
                repo,
                issue_number
              });
              return data;
            }

            let freshIssue = await getFreshIssue();

            if (context.eventName === 'issues' && context.payload.action === 'opened') {
              for (let attempt = 0; attempt < 6; attempt += 1) {
                const labels = (freshIssue.labels || []).map(label => label.name);
                if (labels.includes('needs maintainer review')) break;

                core.info('Waiting for issue validator labels before creating triage suggestion...');
                await sleep(5000);
                freshIssue = await getFreshIssue();
              }
            }

            const username = freshIssue.user.login;
            const currentLabels = (freshIssue.labels || []).map(label => label.name);
            const finalDecisionLabels = ['go ahead', 'duplicate', 'not needed', 'out of scope', 'closed', 'ready to work'];

            if (!currentLabels.includes('needs maintainer review')) {
              core.info('Skipping triage suggestion because the issue is not waiting for maintainer review.');
              return;
            }

            if (finalDecisionLabels.some(label => currentLabels.includes(label))) {
              core.info('Skipping triage suggestion because the issue already has a final decision or ready label.');
              return;
            }

            const suggestionLabels = [
              'suggest-go-ahead',
              'suggest-duplicate',
              'suggest-out-of-scope',
              'suggest-already-addressed',
              'suggest-needs-info',
              'suggest-not-actionable'
            ];

            const labelDefinitions = {
              'suggest-go-ahead': '0E8A16',
              'suggest-duplicate': 'CFD3D7',
              'suggest-out-of-scope': 'D93F0B',
              'suggest-already-addressed': '1D76DB',
              'suggest-needs-info': 'FBCA04',
              'suggest-not-actionable': 'D93F0B'
            };

            const recommendationConfig = {
              'suggest-go-ahead': {
                title: '🧠 Triage Suggestion — Looks Good',
                callout: '[!TIP]',
                summary: 'This issue looks valid, actionable, and ready for maintainer review.',
                action: 'go ahead',
                fallbackReason: 'No strong duplicate was found, and the request appears to fit the project scope.'
              },
              'suggest-duplicate': {
                title: '🧠 Triage Suggestion — Possible Duplicate',
                callout: '[!WARNING]',
                summary: 'This issue looks similar to an existing issue.',
                action: 'duplicate',
                fallbackReason: 'This may already be tracked in another issue.'
              },
              'suggest-out-of-scope': {
                title: '🧠 Triage Suggestion — Possibly Out of Scope',
                callout: '[!CAUTION]',
                summary: 'This request may not fit the current VoiceForge project scope.',
                action: 'out of scope',
                fallbackReason: 'The request does not clearly match the current project direction or supported workflows.'
              },
              'suggest-already-addressed': {
                title: '🧠 Triage Suggestion — May Already Be Addressed',
                callout: '[!NOTE]',
                summary: 'A similar request appears to have already been handled.',
                action: 'review existing resolution',
                fallbackReason: 'This may already be covered by a closed issue or merged change.'
              },
              'suggest-needs-info': {
                title: '🧠 Triage Suggestion — Needs More Details',
                callout: '[!WARNING]',
                summary: 'This issue may need more information before maintainers can make a decision.',
                action: 'ask for more information',
                fallbackReason: 'The issue passed the template check, but the request still needs clearer details, examples, or reproduction steps.'
              },
              'suggest-not-actionable': {
                title: '🧠 Triage Suggestion — Not Clearly Actionable',
                callout: '[!CAUTION]',
                summary: 'This issue does not yet describe a clear task maintainers or contributors can act on.',
                action: 'ask for clarification or close if not actionable',
                fallbackReason: 'The request may need a clearer problem statement, expected behavior, or implementation target.'
              }
            };

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color: labelDefinitions[name] || 'EDEDED'
                  });
                } else {
                  throw error;
                }
              }
            }

            async function addSuggestionLabel(name) {
              await ensureLabel(name);
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [name] });
            }

            async function removeOldSuggestionLabels() {
              for (const name of suggestionLabels) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            }

            function cleanText(text) {
              return (text || '')
                .replace(/<!--[\s\S]*?-->/g, ' ')
                .replace(/[^\p{L}\p{N}\s#-]/gu, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            }

            function getKeywords(text) {
              const stopWords = new Set([
                'the', 'and', 'for', 'with', 'from', 'this', 'that', 'issue', 'feature',
                'bug', 'error', 'please', 'when', 'then', 'there', 'where', 'what',
                'voiceforge', 'gssoc', 'nsoc', 'ssoc', 'elusoc'
              ]);
              return [...new Set(cleanText(text).toLowerCase().split(' '))]
                .filter(word => word.length > 3 && !stopWords.has(word))
                .slice(0, 8);
            }

            async function searchIssues(state) {
              const keywords = getKeywords(`${freshIssue.title} ${freshIssue.body}`).slice(0, 8);
              const terms = keywords.slice(0, 5).filter(Boolean);
              if (terms.length === 0) return [];

              const query = `repo:${owner}/${repo} is:issue is:${state} ${terms.join(' ')}`;
              const { data } = await github.rest.search.issuesAndPullRequests({
                q: query,
                per_page: 30
              });

              return data.items
                .filter(item => item.number !== issue_number && !item.pull_request)
                .slice(0, 10)
                .map(item => ({
                  number: item.number,
                  title: item.title,
                  state: item.state,
                  labels: (item.labels || []).map(label => label.name || label),
                  url: item.html_url,
                  excerpt: cleanText(item.body || '').slice(0, 500)
                }));
            }

            async function getReadmeSummary() {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: 'README.md'
                });
                if (!data.content) return '';
                return Buffer.from(data.content, data.encoding || 'base64')
                  .toString('utf8')
                  .replace(/<!--[\s\S]*?-->/g, '')
                  .slice(0, 3000);
              } catch (error) {
                core.warning(`Could not read README.md for triage context: ${error.message}`);
                return '';
              }
            }

            async function askModel(input) {
              const response = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: githubModel,
                  messages: [
                    {
                      role: 'system',
                      content:
                        'You are a GitHub issue triage assistant for VoiceForge. ' +
                        'You only provide advisory recommendations for maintainers. ' +
                        'Never close issues, never assign users, and never use final maintainer labels. ' +
                        'Return valid JSON only.'
                    },
                    {
                      role: 'user',
                      content: JSON.stringify(input)
                    }
                  ],
                  response_format: {
                      type: 'json_schema',
                      json_schema: {
                        name: 'issue_triage_suggestion',
                        strict: true,
                        schema: {
                        type: 'object',
                        additionalProperties: false,
                        properties: {
                          label: { type: 'string', enum: suggestionLabels },
                          confidence: { type: 'number', minimum: 0, maximum: 1 },
                          reason: { type: 'string', maxLength: 300 },
                          similarIssues: {
                            type: 'array',
                            maxItems: 3,
                            items: {
                              type: 'object',
                              additionalProperties: false,
                              properties: {
                                number: { type: 'number' },
                                reason: { type: 'string', maxLength: 120 }
                              },
                              required: ['number', 'reason']
                            }
                          }
                        },
                        required: ['label', 'confidence', 'reason', 'similarIssues']
                      }
                    }
                  },
                  temperature: 0.2
                })
              });

              const data = await response.json();
              if (!response.ok) {
                throw new Error(data.error?.message || `GitHub Models request failed with ${response.status}`);
              }

              const text = data.choices?.[0]?.message?.content?.trim();

              if (!text) throw new Error('GitHub Models response did not include JSON text.');
              return JSON.parse(text);
            }

            async function createOrUpdateComment(body) {
              const marker = '<!-- voiceforge-triage-suggestion -->';
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });
              const existing = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body &&
                comment.body.includes(marker)
              );

              if (existing) {
                if (existing.body.trim() === body.trim()) return;
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            }

            function buildComment(result) {
              const config = recommendationConfig[result.label] || recommendationConfig['suggest-needs-info'];
              const similarIssues = Array.isArray(result.similarIssues) ? result.similarIssues : [];
              const similarBlock = similarIssues.length > 0
                ? similarIssues
                    .slice(0, 3)
                    .map(item => `- #${item.number}${item.reason ? ` — ${item.reason}` : ''}`)
                    .join('\n')
                : 'No close match found.';
              const reason = result.reason || config.fallbackReason;

              return (
                `<!-- voiceforge-triage-suggestion -->\n\n` +
                `## ${config.title}\n\n` +
                `> ${config.callout}\n` +
                `> ${config.summary}\n\n` +
                `Hey @${username}! 👋 Thanks for opening this issue.\n\n` +
                `${reason}\n\n` +
                `**Similar Issues:**\n` +
                `${similarBlock}\n\n` +
                `**Suggested maintainer action:** \`${config.action}\`\n\n` +
                `⚠️ This is only a suggestion. A maintainer will make the final decision.\n\n` +
                `---\n` +
                `<sub>🤖 VoiceForge Automation · *Updates automatically on edits*</sub>`
              );
            }

            const issueType = currentLabels.includes('bug')
              ? 'bug'
              : currentLabels.includes('enhancement')
                ? 'enhancement'
                : 'unknown';
            const programLabel = currentLabels.find(label =>
              ['gssoc26', 'nsoc26', 'SSoC26', 'ELUSOC'].includes(label)
            ) || 'unknown';

            const [openIssues, closedIssues, readme] = await Promise.all([
              searchIssues('open'),
              searchIssues('closed'),
              getReadmeSummary()
            ]);

            const input = {
              repository: `${owner}/${repo}`,
              scopeSummary: readme,
              instructions: {
                allowedLabels: suggestionLabels,
                chooseExactlyOneLabel: true,
                doNotUseFinalDecisionLabels: ['go ahead', 'duplicate', 'not needed', 'out of scope', 'closed', 'ready to work'],
                preferNeedsInfoWhenUncertain: true
              },
              issue: {
                number: issue.number,
                title: freshIssue.title,
                body: cleanText(freshIssue.body || '').slice(0, 6000),
                labels: currentLabels,
                issueType,
                programLabel
              },
              candidates: {
                similarOpenIssues: openIssues,
                similarClosedIssues: closedIssues
              }
            };

            let result;
            try {
              result = await askModel(input);
            } catch (error) {
              core.warning(`Could not generate triage suggestion: ${error.message}`);
              result = {
                label: 'suggest-needs-info',
                confidence: 0,
                reason: 'The automated triage check could not complete, so maintainer review is needed.',
                similarIssues: []
              };
            }

            if (!suggestionLabels.includes(result.label)) {
              core.warning(`Model returned unsupported label "${result.label}". Falling back to suggest-needs-info.`);
              result.label = 'suggest-needs-info';
            }

            await removeOldSuggestionLabels();
            await addSuggestionLabel(result.label);
            await createOrUpdateComment(buildComment(result));
